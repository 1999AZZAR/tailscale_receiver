name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -o /dev/null ./cmd/receiver/

      - name: Vet
        run: go vet ./cmd/receiver/

      - name: Check formatting
        run: |
          if [ "$(gofmt -l ./cmd/ 2>&1)" != "" ]; then
            gofmt -d ./cmd/
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run unit tests
        run: |
          if [ -d "./cmd/receiver" ] && ls ./cmd/receiver/*_test.go 2>/dev/null; then
            go test -v -race -count=1 ./cmd/receiver/
          else
            echo "No test files found — skipping"
          fi

      - name: Build test (race detection)
        run: go build -race -o /dev/null ./cmd/receiver/

  integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binary
        run: go build -o tailscale-receiver-go ./cmd/receiver/

      - name: Mock tailscale CLI
        run: |
          sudo tee /usr/local/bin/tailscale > /dev/null <<'SCRIPT'
          #!/bin/bash
          case "$1" in
            status)
              echo '{"BackendState":"Running"}'
              ;;
            file)
              echo "$2 $3" >> /tmp/ts-calls.log
              ;;
          esac
          SCRIPT
          sudo chmod +x /usr/local/bin/tailscale

      - name: Test once mode
        run: |
          TARGET_DIR=$(mktemp -d)
          TARGET_USER=$(whoami)

          ./tailscale-receiver-go -dir "$TARGET_DIR" -user "$TARGET_USER" -once

          if [ -d "$TARGET_DIR" ]; then
            echo "PASS: target dir created"
          else
            echo "FAIL: target dir missing"
            exit 1
          fi

      - name: Test version flag
        run: |
          ./tailscale-receiver-go -version

  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          hide-progress: true

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
